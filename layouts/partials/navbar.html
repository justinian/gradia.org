<div class="navbar navbar-default navbar-fixed-top">
	<div class="container">
		<div class="navbar-header">
			<a href="/" class="navbar-brand">{{ .Site.Title }}</a>
			<button class="navbar-toggle" type="button" data-toggle="collapse" data-target="#navbar-main">
				<span class="icon-bar"></span>
				<span class="icon-bar"></span>
 				<span class="icon-bar"></span>
			</button>
		</div>
		<div class="navbar-collapse collapse" id="navbar-main">
			<ul class="nav navbar-nav navbar-right">
				{{ range $taxName, $tax := .Site.Taxonomies }}
				<li class="dropdown">
					<a class="dropdown-toggle" data-toggle="dropdown" href="#" id="sections">{{ $taxName | title }}<span class="caret"></span></a>
					<ul class="dropdown-menu" aria-labelledby="download">
						{{ range $name, $pages := $tax }}
						<li><a href="/categories/{{ $name | urlize }}">{{ $name }}</a></li>
						{{ end }}
					</ul>
				</li> 
				{{ end }}
			</ul>
		</div>
	</div>
</div>
<!-- vim: set ts=2 sw=2 :-->
